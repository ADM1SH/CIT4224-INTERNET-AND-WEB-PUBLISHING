<!DOCTYPE html><html>
    <head>
        <style>
            *{padding: 12;}

            #card {
            width: 450px;
            height: 400px;
            border: 5px solid darkblue;
            background-image: url('workshop.jpg');
            background-size: 25%;
            background-position: bottom right;
            background-repeat: no-repeat;
        }

        /* All h1 elements */
        h1 {
            font-family: Arial, sans-serif;
            color: darkgreen;
            text-transform: uppercase;
        }

        /* All h3 elements */
        h3 {
            font-style: italic;
            color: purple;
        }

        /* Paragraph inside card id */
        #card p {
            text-align: center;
            letter-spacing: 4px;
        }

        /* Hyperlink styling */
        a {
            text-decoration: none; /* Remove underline */
        }

        a:hover {
            color: red; /* Change color when hovered */
        }
        </style>
    </head>
        <body>

        <div id="card">
        <h1>Web Design Workshop</h1>
        <h3>August 2024</h3>
        <p>9:00 AM – 4:00 PM Multimedia Hall</p>
        <a href="#">Register Here</a>
        </div>

        </body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Manage Bookings - Probook Sports</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="admin-wrapper">
        <div class="sidebar">
            <div style="background:white; padding:10px; border-radius:10px; margin-bottom:20px; text-align:center;"><a href="index.html"><img src="images/LogoTopLeft.png" alt="Logo" style="height: 40px;"></a></div><h2 style="border:none; margin:10px 0; font-size:1.2rem; color:white; text-align:center;">Probook Admin</h2>
            <a href="admin_dashboard.html" class="nav-link">Dashboard Overview</a>
            <a href="manage_bookings.html" class="nav-link active">Manage Bookings</a>
            <a href="manage_facilities.html" class="nav-link">Court Settings</a>
            <a href="manage_players.html" class="nav-link">Manage Players</a>
            <a href="manage_staff.html" class="nav-link">Manage Staff</a>
            <a href="sales_report.html" class="nav-link">Sales Report</a>
            <div style="margin-top: auto;">
                <a href="index.html" class="nav-link" style="opacity: 0.7;">Logout</a>
            </div>
        </div>

        <div class="main-content-area">
            <h1>Manage Bookings (Master Schedule)</h1>

            <div class="card" id="editFormContainer" style="display: none;">
                <h2 id="formTitle">Edit Booking</h2>
                <form id="bookingForm">
                    <input type="hidden" id="bookingIndex">
                    <div style="margin-bottom: 15px;">
                        <label>Customer:</label>
                        <span id="displayCustomer" style="font-style: italic;"></span>
                    </div>
                    <label for="bookFacility">Facility:</label>
                    <select id="bookFacility"></select>

                    <label for="bookDate">Date:</label>
                    <input type="date" id="bookDate" required>

                    <label for="bookTime">Time:</label>
                    <input type="time" id="bookTime" required>

                    <label for="bookStatus">Status:</label>
                    <select id="bookStatus">
                        <option value="Confirmed">Confirmed</option>
                        <option value="Pending">Pending</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>

                    <div style="margin-top: 20px;">
                        <button type="submit">Update Booking</button>
                        <button type="button" style="background-color:#666;" onclick="hideEditForm()">Close</button>
                    </div>
                </form>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>All Court Bookings</h2>
                    <input type="text" id="bookingSearch" placeholder="Search by customer or court..." style="width: 250px; padding: 10px; margin: 0;">
                </div>
                <table id="bookingsTable">
                    <thead>
                        <tr>
                            <th>Customer</th>
                            <th>Facility</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Bookings via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/manage_bookings.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Cyberjaya Sports Center</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <script src="js/common.js"></script>
    <div class="login-container">
        <div class="login-card" style="width: 1000px;">
            <div class="login-visual user-theme">
                <div style="background:white; padding:10px; border-radius:10px; margin-bottom:20px;"><img src="images/LogoTopLeft.png" alt="Logo" style="height: 50px; display:block;"></div>
                <h2>Join the Community</h2>
                <p>Register once and enjoy seamless bookings across all our sports facilities.</p>
                <div style="margin-top: 40px;">
                    <a href="index.html" style="color: white; text-decoration: none; font-size: 0.9rem;">← Back to Home</a>
                </div>
            </div>
            
            <div class="login-form-side">
                <h3>Create Account</h3>
                <form action="login.html">
                    <div style="display: flex; gap: 15px;">
                        <div class="input-group" style="flex: 1;">
                            <label>Full Name</label>
                            <input type="text" id="fname" required>
                        </div>
                        <div class="input-group" style="flex: 1;">
                            <label>Email Address</label>
                            <input type="email" id="email" required>
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 15px;">
                        <div class="input-group" style="flex: 1;">
                            <label>Student/Staff ID</label>
                            <input type="text" id="id" placeholder="e.g. 123456789">
                        </div>
                        <div class="input-group" style="flex: 1;">
                            <label>Preferred Sport</label>
                            <select name="sport">
                                <option value="badminton">Badminton</option>
                                <option value="futsal">Futsal</option>
                                <option value="tennis">Tennis</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="pass" required>
                    </div>
                    
                    <button type="submit" class="btn-login user-btn">Register Now</button>
                    
                    <div style="margin-top: 20px; text-align: center; font-size: 0.9rem;">
                        Already have an account? <a href="login.html" style="color: var(--user-color); font-weight: bold;">Login here</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="js/register.js"></script>
</body>
</html>

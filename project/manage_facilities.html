<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Manage Facilities - Probook Sports</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="admin-wrapper">
        <div class="sidebar">
            <div style="background:white; padding:10px; border-radius:10px; margin-bottom:20px; text-align:center;"><a href="index.html"><img src="images/LogoTopLeft.png" alt="Logo" style="height: 40px;"></a></div><h2 style="border:none; margin:10px 0; font-size:1.2rem; color:white; text-align:center;">Probook Admin</h2>
            <a href="admin_dashboard.html" class="nav-link">Dashboard Overview</a>
            <a href="manage_bookings.html" class="nav-link">Manage Bookings</a>
            <a href="manage_facilities.html" class="nav-link active">Court Settings</a>
            <a href="manage_players.html" class="nav-link">Manage Players</a>
            <a href="manage_staff.html" class="nav-link">Manage Staff</a>
            <a href="sales_report.html" class="nav-link">Sales Report</a>
            <div style="margin-top: auto;">
                <a href="index.html" class="nav-link" style="opacity: 0.7;">Logout</a>
            </div>
        </div>

        <div class="main-content-area">
            <h1>Manage Facilities (Items/Services)</h1>

            <div class="card">
                <h2 id="formTitle">Add/Update Facility</h2>
                <form id="facilityForm">
                    <input type="hidden" id="facilityIndex" value="">
                    <label for="facName">Facility Name:</label>
                    <input type="text" id="facName" placeholder="e.g. Badminton Court 1" required>
                    
                    <label for="facType">Type:</label>
                    <select id="facType">
                        <option value="Badminton">Badminton</option>
                        <option value="Tennis">Tennis</option>
                        <option value="Futsal">Futsal</option>
                        <option value="Basketball">Basketball</option>
                    </select>
                    
                    <label for="facPrice">Price per Hour (RM):</label>
                    <input type="number" id="facPrice" step="0.50" placeholder="e.g. 20.00" required>
                    
                    <button type="submit" id="submitBtn">Save Facility</button>
                    <button type="button" style="background-color:#666;" onclick="resetForm()">Clear</button>
                </form>
            </div>

            <div class="card">
                <h2>Current Facilities & Pricing</h2>
                <table id="facilitiesTable">
                    <thead>
                        <tr>
                            <th>Facility Name</th>
                            <th>Type</th>
                            <th>Price (RM/Hour)</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/manage_facilities.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Manage Players - Probook Sports</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="admin-wrapper">
        <div class="sidebar">
            <div style="background:white; padding:10px; border-radius:10px; margin-bottom:20px; text-align:center;"><a href="index.html"><img src="images/LogoTopLeft.png" alt="Logo" style="height: 40px;"></a></div><h2 style="border:none; margin:10px 0; font-size:1.2rem; color:white; text-align:center;">Probook Admin</h2>
            <a href="admin_dashboard.html" class="nav-link">Dashboard Overview</a>
            <a href="manage_bookings.html" class="nav-link">Manage Bookings</a>
            <a href="manage_facilities.html" class="nav-link">Court Settings</a>
            <a href="manage_players.html" class="nav-link active">Manage Players</a>
            <a href="manage_staff.html" class="nav-link">Manage Staff</a>
            <a href="sales_report.html" class="nav-link">Sales Report</a>
            <div style="margin-top: auto;">
                <a href="index.html" class="nav-link" style="opacity: 0.7;">Logout</a>
            </div>
        </div>

        <div class="main-content-area">
            <h1>Manage Players (Registered Members)</h1>

            <div class="card">
                <h2 id="formTitle">Add/Update Player</h2>
                <form id="playerForm">
                    <input type="hidden" id="playerIndex" value="">
                    <label for="playerName">Player Name:</label>
                    <input type="text" id="playerName" placeholder="e.g. John Doe" required>
                    
                    <label for="playerEmail">Email Address:</label>
                    <input type="email" id="playerEmail" placeholder="e.g. john@example.com" required>
                    
                    <label for="playerPhone">Phone Number:</label>
                    <input type="text" id="playerPhone" placeholder="e.g. 012-3456789" required>
                    
                    <label for="playerStatus">Membership Status:</label>
                    <select id="playerStatus">
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                        <option value="Banned">Banned</option>
                    </select>
                    
                    <button type="submit" id="submitBtn">Save Player</button>
                    <button type="button" style="background-color:#666;" onclick="resetForm()">Clear</button>
                </form>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>All Registered Players</h2>
                    <input type="text" id="playerSearch" placeholder="Search by name or email..." style="width: 250px; padding: 10px; margin: 0;">
                </div>
                <table id="playersTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/manage_players.js"></script>
</body>
</html>

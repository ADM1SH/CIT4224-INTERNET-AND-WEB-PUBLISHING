<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Manage Staff - Probook Sports</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="admin-wrapper">
        <div class="sidebar">
            <div style="background:white; padding:10px; border-radius:10px; margin-bottom:20px; text-align:center;"><a href="index.html"><img src="images/LogoTopLeft.png" alt="Logo" style="height: 40px;"></a></div><h2 style="border:none; margin:10px 0; font-size:1.2rem; color:white; text-align:center;">Probook Admin</h2>
            <a href="admin_dashboard.html" class="nav-link">Dashboard Overview</a>
            <a href="manage_bookings.html" class="nav-link">Manage Bookings</a>
            <a href="manage_facilities.html" class="nav-link">Court Settings</a>
            <a href="manage_players.html" class="nav-link">Manage Players</a>
            <a href="manage_staff.html" class="nav-link active">Manage Staff</a>
            <a href="sales_report.html" class="nav-link">Sales Report</a>
            <div style="margin-top: auto;">
                <a href="index.html" class="nav-link" style="opacity: 0.7;">Logout</a>
            </div>
        </div>

        <div class="main-content-area">
            <h1>Manage Staff (System Users)</h1>

            <div class="card">
                <h2 id="formTitle">Add/Update Staff</h2>
                <form id="staffForm">
                    <input type="hidden" id="staffIndex" value="">
                    <label for="staffName">Staff Name:</label>
                    <input type="text" id="staffName" placeholder="e.g. Staff Name" required>
                    
                    <label for="staffRole">Role:</label>
                    <select id="staffRole">
                        <option value="Admin">Admin</option>
                        <option value="Receptionist">Receptionist</option>
                        <option value="Maintenance">Maintenance</option>
                    </select>
                    
                    <label for="staffUser">Username:</label>
                    <input type="text" id="staffUser" placeholder="e.g. staff_admin" required>
                    
                    <label for="staffPass">Password:</label>
                    <input type="password" id="staffPass" placeholder="Leave blank to keep current" required>
                    
                    <button type="submit" id="submitBtn">Save Staff Member</button>
                    <button type="button" style="background-color:#666;" onclick="resetForm()">Clear</button>
                </form>
            </div>

            <div class="card">
                <h2>All Staff Members</h2>
                <table id="staffTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Role</th>
                            <th>Username</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/manage_staff.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join Us - Cyberjaya Sports Center</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card" style="width: 1000px; flex-direction: column; padding: 50px; text-align: center;">
            <div style="margin-bottom: 30px;">
                <img src="images/LogoTopLeft.png" alt="Logo" style="height: 80px;">
            </div>
            <h1 style="color: var(--primary-color); font-size: 2.5rem;">Level Up Your Game</h1>
            <p style="font-size: 1.2rem; color: var(--light-text); max-width: 700px; margin: 20px auto;">
                Join over 1,000+ athletes in Cyberjaya. Get access to student discounts, priority booking, and our loyalty rewards program.
            </p>
            
            <div class="stats-grid" style="margin: 40px 0;">
                <div class="stat-card"><h3>Student Price</h3><p>RM 10/hr</p></div>
                <div class="stat-card"><h3>Facilities</h3><p>12+ Courts</p></div>
                <div class="stat-card"><h3>Rewards</h3><p>Earn Points</p></div>
            </div>

            <div style="display: flex; gap: 20px; justify-content: center;">
                <a href="register.html" class="btn-login user-btn" style="text-decoration: none; padding: 15px 40px;">Create Free Account</a>
                <a href="about.html" class="btn-login" style="opacity: 0.7; text-decoration: none; padding: 15px 40px;">Learn More</a>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Dashboard - Probook Sports</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="admin-wrapper">
        <div class="sidebar">
            <div style="background:white; padding:10px; border-radius:10px; margin-bottom:20px; text-align:center;">
                <a href="index.html"><img src="images/LogoTopLeft.png" alt="Logo" style="height: 40px;"></a>
            </div>
            <h2 style="border:none; margin:10px 0; font-size:1.2rem; color:white; text-align:center;">Member Portal</h2>
            <a href="user_dashboard.html" class="nav-link active">My Bookings</a>
            <a href="court_list.html" class="nav-link">Book New Court</a>
            <a href="feedback.html" class="nav-link">Give Feedback</a>
            <div style="margin-top: auto;">
                <a href="index.html" class="nav-link" style="opacity: 0.7;">Logout</a>
            </div>
        </div>

        <div class="main-content-area">
            <h1>Welcome Back, Player!</h1>
            
            <div class="stats-grid">
                <div class="stat-card" style="border-left: 5px solid var(--primary-color);">
                    <h3>Upcoming Games</h3>
                    <div class="stat-number" id="userBookingCount">0</div>
                </div>
                <div class="stat-card" style="border-left: 5px solid var(--primary-color);">
                    <h3>Loyalty Points</h3>
                    <div class="stat-number">150 pts</div>
                </div>
            </div>

            <div class="card">
                <h2>My Recent Activity</h2>
                <table id="userBookingsTable">
                    <thead>
                        <tr>
                            <th>Court</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const bookings = JSON.parse(localStorage.getItem("bookingList")) || [];
            const tbody = document.querySelector("#userBookingsTable tbody");
            
            tbody.innerHTML = bookings.map(book => `
                <tr>
                    <td>${book.facility}</td>
                    <td>${book.date}</td>
                    <td>${book.time}</td>
                    <td><span class="status-pill status-paid">${book.status}</span></td>
                </tr>
            `).join('');
            
            document.getElementById("userBookingCount").innerText = bookings.length;
        };
    </script>
</body>
</html>

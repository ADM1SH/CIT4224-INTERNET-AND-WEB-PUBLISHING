<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>---<i>Best Property Agent</i>---</title>
    </head>

    <body>
        <form action="">
            <h3><u><b>Property Search</b></u></h3>
            <label for="agentname">Agent Name :</label>
            <input type="text" name="agentname" size="35" required>

            <br>
            <br>

            <label for="notitype">Notification Type :</label>
            <input type="radio" name="notitype" id="email">
            <label for="email">Email</label>
            <input type="radio" name="notitype" id="whatsapp">
            <label for="whatsapp">Whatsapp</label>
            <input type="radio" name="notitype" id="PhoneCall">
            <label for="PhoneCall">Phone Call</label>

            <br>
            <br>

            <label for="numreq">Numbers Required :</label>
            <input type="number" name="numreq" id="numbox" value="3" min="1" max="20">

            <br>
            <br>

            <iframe src="https://ul.waze.com/ul?place=ChIJq4Niej44zDERhMmCfQGiqc8&ll=3.20560600%2C101.73191300&navigate=yes&utm_campaign=default&utm_source=waze_website&utm_medium=lm_share_location" 
            height="250" width="250" frameborder="0"></iframe>
            
            <br>
            <br>

            <input type="submit" name="req" id="req" value="Request Property">
            <input type="button" name="clear" id="clear" value="Clear">

        </form>
    </body>
</html>
